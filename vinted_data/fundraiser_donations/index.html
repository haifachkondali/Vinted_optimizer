.cell-images__item {

}

.cell-images__item a {

  align-items: center;
  display: flex;
  height: 100%;
}

.cell-images__item img,
.cell-images__item video {
  width: 90%;
}

.cell-table {

  margin: 8px 0 0 0;
  padding-left: 24px;
}

.cell-table li {
  margin-bottom: 6px;
}

.message-image-container {
  width: 20%;
  height: 120px;
  display: inline-block;
}

.message-image-container img {
  display: flex;
  height: 100%;
}

.text-right {
  text-align: right;
}

.text-indent {
  text-indent: 2em;
}
